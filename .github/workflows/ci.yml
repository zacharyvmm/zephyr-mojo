name: zephyr-mojo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mojo-version: ["1.0.0b1"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Mojo
        run: |
          uv venv
          uv pip install "mojo==${{ matrix.mojo-version }}" --prerelease=allow

      - name: Regenerate zephyr_sys
        run: python3 -m codegen.gen_sys

      - name: Test imports (all 15 modules)
        run: .venv/bin/mojo run -I . tests/test_imports.mojo

      - name: Smoke test
        run: .venv/bin/mojo run -I . tests/test_smoke.mojo

      - name: Compile all examples
        run: |
          for ex in examples/*.mojo; do
            echo "=== $ex ==="
            .venv/bin/mojo run -I . "$ex" 2>&1 | head -4 || true
          done

  native_sim:
    runs-on: ubuntu-latest
    needs: compile
    if: false  # Disabled until west + Zephyr SDK are available in CI
    steps:
      - uses: actions/checkout@v4
        with:
          path: zephyr-mojo

      - name: Checkout Zephyr
        uses: actions/checkout@v4
        with:
          repository: zephyrproject-rtos/zephyr
          path: zephyr
          ref: v4.1.0

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64.tar.xz -C /opt

      - name: Build native_sim
        run: |
          cd zephyr-mojo/native_sim
          west build -b native_sim -d build

      - name: Run native_sim test
        run: |
          cd zephyr-mojo
          .venv/bin/mojo run -I . native_sim/test_native_sim.mojo

  benchmark:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Mojo
        run: |
          uv venv
          uv pip install "mojo==1.0.0b1" --prerelease=allow

      - name: Run benchmark
        run: |
          .venv/bin/mojo run -I . tests/benchmark_ctypes.mojo 2>&1 || echo "Benchmarks require Zephyr symbols (expected to fail on host without native_sim)"
