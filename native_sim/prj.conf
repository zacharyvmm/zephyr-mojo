# Zephyr Kconfig for zephyr-mojo native_sim integration
# Copy to native_sim/ or pass via west build -- -DCONF_FILE=...

# Enable all kernel features used by zephyr-mojo
CONFIG_PRINTK=y
CONFIG_SEMAPHORE=y
CONFIG_MUTEX=y
CONFIG_CONDVAR=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE=y
CONFIG_POLL=y
CONFIG_TIMER=y

# Enable queues (FIFO/LIFO based)
CONFIG_QUEUE=y

# Enable message queues
CONFIG_MSGQ=y

# Debug options for development
CONFIG_DEBUG=y
CONFIG_ASSERT=y
CONFIG_ASSERT_LEVEL=2
